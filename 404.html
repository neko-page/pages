<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>404 - 页面未找到</title> <style> :root { --bg-color: #050505; --text-color: #f0f0f0; --accent-1: #ff0055; /* Pink */ --accent-2: #00f2ff; /* Cyan */ --accent-3: #00ff66; /* Green */ --font-stack: 'Courier New', Courier, monospace; } * { margin: 0; padding: 0; box-sizing: border-box; } body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-stack); height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; position: relative; } /* 扫描线背景效果 */ body::after { content: ""; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 100; } .container { z-index: 10; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 3rem; position: relative; } /* 上方旋转图案 */ .rotor-container { width: 120px; height: 120px; position: relative; transform-style: preserve-3d; } .box { position: absolute; top: 0; left: 0; bottom: 0; right: 0; border: 2px solid var(--accent-2); border-radius: 4px; box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); } .box:nth-child(1) { animation: spin1 6s linear infinite; border-color: var(--accent-1); box-shadow: 0 0 10px rgba(255, 0, 85, 0.3); } .box:nth-child(2) { animation: spin2 4s linear infinite reverse; border-color: var(--accent-2); } .box:nth-child(3) { animation: spin3 5s ease-in-out infinite; border-color: var(--accent-3); box-shadow: 0 0 10px rgba(0, 255, 102, 0.3); } @keyframes spin1 { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(360deg) rotateY(360deg); } } @keyframes spin2 { 0% { transform: rotate(0deg) skew(10deg); } 100% { transform: rotate(-360deg) skew(10deg); } } @keyframes spin3 { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.1) rotate(45deg); } } /* 404 文字 Glitch 效果 */ .glitch-wrapper { position: relative; } .glitch-text { font-size: 8rem; font-weight: bold; text-transform: uppercase; position: relative; letter-spacing: 10px; color: var(--text-color); } .glitch-text::before, .glitch-text::after { content: "404"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); } .glitch-text::before { left: 2px; text-shadow: -2px 0 var(--accent-1); clip-path: inset(0 0 0 0); animation: glitch-anim-1 2s infinite linear alternate-reverse; } .glitch-text::after { left: -2px; text-shadow: 2px 0 var(--accent-2); clip-path: inset(0 0 0 0); animation: glitch-anim-2 3s infinite linear alternate-reverse; } @keyframes glitch-anim-1 { 0% { clip-path: inset(20% 0 80% 0); } 20% { clip-path: inset(60% 0 10% 0); } 40% { clip-path: inset(40% 0 50% 0); } 60% { clip-path: inset(80% 0 5% 0); } 80% { clip-path: inset(10% 0 70% 0); } 100% { clip-path: inset(30% 0 20% 0); } } @keyframes glitch-anim-2 { 0% { clip-path: inset(10% 0 60% 0); } 20% { clip-path: inset(30% 0 20% 0); } 40% { clip-path: inset(70% 0 10% 0); } 60% { clip-path: inset(20% 0 40% 0); } 80% { clip-path: inset(50% 0 30% 0); } 100% { clip-path: inset(80% 0 5% 0); } } .subtitle { font-size: 1.2rem; color: #888; margin-top: -1rem; letter-spacing: 2px; } .subtitle span { color: var(--accent-3); } /* 按钮组 */ .actions { display: flex; gap: 20px; margin-top: 2rem; } .btn { position: relative; padding: 12px 32px; font-family: var(--font-stack); font-size: 1rem; font-weight: bold; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s ease; background: transparent; border: 2px solid var(--accent-1); color: var(--accent-1); cursor: pointer; overflow: hidden; } .btn:hover { background: var(--accent-1); color: #fff; box-shadow: 5px 5px 0px var(--accent-2); transform: translate(-2px, -2px); } .btn.btn-sec { border-color: var(--accent-2); color: var(--accent-2); } .btn.btn-sec:hover { background: var(--accent-2); color: #000; box-shadow: 5px 5px 0px var(--accent-3); } /* 错位线条 Glitch Lines */ .glitch-line { position: absolute; height: 2px; background: #fff; z-index: 5; pointer-events: none; box-shadow: 0 0 5px #fff; animation: glitch-line-anim 0.3s steps(2) forwards; opacity: 0.8; } @keyframes glitch-line-anim { 0% { transform: scaleX(0); opacity: 1; } 10% { transform: scaleX(1.5) skewX(45deg); opacity: 0.9; } 50% { transform: scaleX(0.8) translateX(20px); opacity: 0.5; } 100% { transform: scaleX(0); opacity: 0; } } @media (max-width: 768px) { .glitch-text { font-size: 5rem; } .actions { flex-direction: column; gap: 15px; width: 80%; } .btn { width: 100%; text-align: center; } } </style> </head> <body> <div class="container"> <!-- 旋转图案 --> <div class="rotor-container"> <div class="box"></div> <div class="box"></div> <div class="box"></div> </div> <!-- 404 文字 --> <div class="glitch-wrapper"> <div class="glitch-text">404</div> </div> <div class="subtitle"> ERROR: <span>PAGE_NOT_FOUND</span> // SYSTEM_MALFUNCTION </div> <!-- 按钮 --> <div class="actions"> <a href="javascript:history.back()" class="btn btn-sec">返回上一级</a> <a href="/" class="btn">返回首页</a> </div> </div> <script> // JS 逻辑：随机生成背景错位线条，营造 Bug 感 const body = document.body; function createGlitchLine() { const line = document.createElement('div'); line.classList.add('glitch-line'); // 随机属性 const top = Math.random() * 100; const width = Math.random() * 300 + 100; // 100px - 400px const left = Math.random() * 100; const color = Math.random() > 0.5 ? 'var(--accent-1)' : (Math.random() > 0.5 ? 'var(--accent-2)' : '#fff'); line.style.top = top + 'vh'; line.style.left = left + '%'; line.style.width = width + 'px'; line.style.background = color; line.style.boxShadow = `0 0 5px ${color}`; body.appendChild(line); // 动画结束后移除元素 setTimeout(() => { line.remove(); }, 400); } // 随机时间间隔生成线条 function scheduleGlitch() { const delay = Math.random() * 2000 + 200; // 200ms - 2200ms setTimeout(() => { // 偶尔一次生成多条线 const burstCount = Math.random() > 0.8 ? Math.floor(Math.random() * 3) + 1 : 1; for(let i = 0; i < burstCount; i++) { setTimeout(createGlitchLine, i * 50); } scheduleGlitch(); }, delay); } // 启动 scheduleGlitch(); // 偶尔让整个文字剧烈抖动一下 const glitchText = document.querySelector('.glitch-text'); setInterval(() => { if (Math.random() > 0.7) { glitchText.style.transform = 'skewX(-10deg)'; setTimeout(() => { glitchText.style.transform = 'skewX(10deg)'; setTimeout(() => { glitchText.style.transform = 'skewX(0)'; }, 50); }, 50); } }, 1000); </script> </body> </html>
