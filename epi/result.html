<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测评结果</title>
<style>
  :root{--p:#2563eb;--bg:#f1f5f9;--card:#fff;--txt:#1e293b;}
  body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:var(--txt);padding:1rem;}
  .wrap{max-width:700px;margin:0 auto;background:var(--card);border-radius:12px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);overflow:hidden;}
  
  .header{background:var(--p);color:#fff;padding:2rem 1rem;text-align:center;}
  .header h1{margin:0;font-size:1.8rem;}
  .header p{margin:0.5rem 0 0;opacity:0.9;font-size:0.95rem;}
  
  .content{padding:1.5rem;}
  
  /* 得分条样式 */
  .score-row{margin-bottom:1.2rem;}
  .score-label{display:flex;justify-content:space-between;margin-bottom:0.3rem;font-size:0.9rem;font-weight:600;}
  .bar-bg{height:10px;background:#e2e8f0;border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--p);border-radius:5px;transition:width 1s ease;}
  
  /* 结果卡片 */
  .result-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:1.5rem;margin-top:2rem;text-align:center;}
  .result-type{font-size:1.5rem;font-weight:bold;color:var(--p);margin-bottom:0.5rem;}
  .result-sub{color:#64748b;font-size:0.9rem;margin-bottom:1rem;}
  
  .desc-box{text-align:left;margin-top:1.5rem;}
  .desc-item{margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px dashed #e2e8f0;}
  .desc-item:last-child{border:none;margin-bottom:0;}
  .desc-title{font-weight:bold;color:#0f172a;margin-bottom:0.3rem;display:flex;align-items:center;}
  .desc-title::before{content:'';display:inline-block;width:6px;height:6px;background:var(--p);border-radius:50%;margin-right:8px;}
  .desc-text{font-size:0.95rem;color:#475569;line-height:1.6;margin:0;}
  
  .btn-back{display:block;width:100%;padding:1rem;margin:2rem 0 0;background:#fff;border:1px solid var(--p);color:var(--p);border-radius:8px;font-size:1rem;cursor:pointer;text-align:center;text-decoration:none;}
  .btn-back:hover{background:#eff6ff;}
  
  @media(max-width:600px){.header h1{font-size:1.4rem;}.result-type{font-size:1.2rem;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>气质测评报告</h1>
    <p>基于艾森克气质类型理论</p>
  </div>
  <div class="content">
    <!-- 得分可视化 -->
    <div class="score-row"><div class="score-label"><span>胆汁质 (A)</span><span id="valA">0</span></div><div class="bar-bg"><div class="bar-fill" id="barA" style="width:0%"></div></div></div>
    <div class="score-row"><div class="score-label"><span>多血质 (B)</span><span id="valB">0</span></div><div class="bar-bg"><div class="bar-fill" id="barB" style="width:0%"></div></div></div>
    <div class="score-row"><div class="score-label"><span>粘液质 (C)</span><span id="valC">0</span></div><div class="bar-bg"><div class="bar-fill" id="barC" style="width:0%"></div></div></div>
    <div class="score-row"><div class="score-label"><span>抑郁质 (D)</span><span id="valD">0</span></div><div class="bar-bg"><div class="bar-fill" id="barD" style="width:0%"></div></div></div>

    <!-- 判定结果 -->
    <div class="result-card">
      <div class="result-type" id="mainResult">计算中...</div>
      <div class="result-sub" id="subResult"></div>
    </div>

    <!-- 详细描述 -->
    <div class="desc-box" id="descBox"></div>

    <a href="index.html" class="btn-back">重新测评</a>
  </div>
</div>

<script>
const descs = {
  A: {name:'胆汁质', text:'直率热情，精力旺盛，脾气急躁，情绪兴奋性高，容易冲动，反应迅速，心境变化剧烈，具有外倾性。情感和情绪发生迅速，爆发力好，但消失也快；智力活动灵敏有力，但理解问题容易粗枝大叶；意志力坚强，不怕挫折，但容易冲动。'},
  B: {name:'多血质', text:'活泼好动，反应灵敏，乐于交往，注意力易转移，兴趣和情绪多变，缺乏持久力，具有外倾性。情感和情绪发生迅速，表露于外，极易变化，灵活而敏捷；工作适应力强，但容易见异思迁。'},
  C: {name:'粘液质', text:'安静、稳重、沉着，反应缓慢，沉默寡言，三思而后行，情绪不易外露，注意力稳定而较难转移，善于忍耐，偏内倾型。情绪比较稳定，兴奋性低，变化缓慢，内向、喜欢沉思；思维和言行稳定而迟缓，冷静而踏实。'},
  D: {name:'抑郁质', text:'情绪体验深刻，行动迟缓，具有较高的感受性，善于觉察他人不易注意的细节，富有幻想，胆小孤僻，具有内倾性。情绪体验深刻，不易外露；对事物有较高的敏感性，观察事物细致；行动缓慢、多愁善感，易于消沉。'}
};

// 获取参数
const params = new URLSearchParams(window.location.search);
const scores = {
  A: parseInt(params.get('A')||0),
  B: parseInt(params.get('B')||0),
  C: parseInt(params.get('C')||0),
  D: parseInt(params.get('D')||0)
};

// 渲染分数条
['A','B','C','D'].forEach(k=>{
  document.getElementById(`val${k}`).textContent = scores[k];
  // 满分60，每项15题*4分=60分。这里用百分比展示
  setTimeout(()=>document.getElementById(`bar${k}`).style.width = `${(scores[k]/60)*100}%`, 100);
});

// 判定逻辑
function evaluate(s){
  const arr = Object.entries(s).sort((a,b)=>b[1]-a[1]); // 从高到低排序
  const [s1, s2, s3, s4] = arr.map(x=>x[1]);
  const [k1, k2, k3, k4] = arr.map(x=>x[0]);
  
  let type = '', sub = '', keys = [];

  // 1. 单一气质：最高分比次高分高出4分以上
  if(s1 - s2 >= 4){
    keys = [k1];
    if(s1 > 20) sub = '典型型';
    else if(s1 >= 10) sub = '一般型';
    else sub = '倾向型';
    type = `${descs[k1].name} (${sub})`;
  }
  // 2. 两种混合：前两名接近(差<3)，且比第三名高出4分以上
  else if(s1 - s2 < 3 && s2 - s3 >= 4){
    keys = [k1, k2];
    type = `${descs[k1].name} + ${descs[k2].name} 混合型`;
    sub = '两种气质混合';
  }
  // 3. 三种混合：前三名接近，且都高于第四名
  else if(s1 - s3 < 3 && s3 - s4 >= 4){
    keys = [k1, k2, k3];
    type = `${descs[k1].name} + ${descs[k2].name} + ${descs[k3].name} 混合型`;
    sub = '三种气质混合';
  }
  // 4. 四种混合：最高分与最低分差异小于3
  else if(s1 - s4 < 3){
    keys = ['A','B','C','D'];
    type = '四种气质混合型';
    sub = '气质分布均衡';
  }
  // 兜底
  else {
    keys = [k1];
    type = `${descs[k1].name} (主导)`;
    sub = '未达显著区分标准';
  }
  
  return {type, sub, keys};
}

const res = evaluate(scores);
document.getElementById('mainResult').textContent = res.type;
document.getElementById('subResult').textContent = res.sub;

// 生成描述HTML
let html = '';
res.keys.forEach(k=>{
  html += `
    <div class="desc-item">
      <div class="desc-title">${descs[k].name} ${scores[k]}分</div>
      <p class="desc-text">${descs[k].text}</p>
    </div>
  `;
});
document.getElementById('descBox').innerHTML = html;
</script>
</body>
</html>
